<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organograma de Times</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: #E2DED6;
    --border2: #CCC9C0;
    --text: #1A1916;
    --text2: #6B6860;
    --text3: #9B9890;
    --accent: #1A1916;
    --accent-fg: #F7F6F3;
    --blue: #2B5BE0;
    --blue-light: #EBF0FF;
    --blue-mid: #ADC0F7;
    --red: #C0392B;
    --red-light: #FDECEA;
    --green: #1A7A4A;
    --green-light: #E8F6EE;
    --radius: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--accent);
    color: var(--accent-fg);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-logo-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-company-logo {
    height: 48px;
    max-width: 160px;
    object-fit: contain;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .header-company-logo:hover { opacity: 0.85; }
  .header-logo-placeholder {
    height: 48px;
    min-width: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px dashed rgba(255,255,255,0.3);
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    gap: 6px;
    padding: 0 12px;
    transition: all 0.15s;
  }
  .header-logo-placeholder:hover { border-color: rgba(255,255,255,0.6); color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.05); }
  .header-divider {
    width: 1px;
    height: 36px;
    background: rgba(255,255,255,0.18);
  }
  .app-header h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.2px;
  }
  .app-header .subtitle {
    font-size: 12px;
    opacity: 0.5;
    font-family: 'DM Mono', monospace;
    margin-left: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 0; }
  .header-title-group { display: flex; align-items: baseline; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: var(--surface2); border-color: var(--text3); }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
  }
  .btn.primary:hover { background: #333; }
  .btn.blue {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
  }
  .btn.blue:hover { background: #2249c0; }
  .btn.danger { color: var(--red); border-color: #F5C6C2; background: var(--red-light); }
  .btn.danger:hover { background: #FBDAD8; }
  .btn.success { color: var(--green); border-color: #A8DFC0; background: var(--green-light); }
  .btn.success:hover { background: #D4F0E2; }
  .sep { width: 1px; height: 20px; background: var(--border); }
  .btn-icon { font-size: 14px; line-height: 1; }

  /* ── BOARD ── */
  .board-wrap {
    padding: 24px 28px;
    overflow-x: auto;
    min-height: calc(100vh - 176px);
  }
  .board {
    display: flex;
    gap: 0;
    min-width: max-content;
    align-items: flex-start;
  }

  /* ── LEADER GROUP ── */
  .leader-group {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-right: 16px;
  }
  .leader-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    border-bottom: none;
    margin-bottom: 0;
  }
  .leader-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid var(--border2);
  }
  .leader-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .leader-info { flex: 1; min-width: 0; }
  .leader-name { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
  .leader-role-tag { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .leader-actions { display: flex; gap: 4px; }
  .leader-icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 11px;
    width: 24px; height: 24px;
    border-radius: 5px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .leader-icon-btn:hover { background: var(--border); color: var(--text); }
  .leader-columns {
    display: flex;
    gap: 12px;
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  }
  .leader-group-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    padding: 0 14px 4px;
    background: var(--surface2);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .no-leader-wrap {
    display: flex;
    gap: 12px;
    margin-right: 0;
  }

  /* ── COLUMN ── */
  .col {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .col-header {
    color: #fff;
    padding: 14px 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .col-header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .col-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }
  .col-logo {
    width: 38px;
    height: 38px;
    border-radius: 7px;
    object-fit: contain;
    background: rgba(255,255,255,0.18);
    flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.25);
    padding: 2px;
  }
  .col-header-name {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.2px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.3;
  }
  /* ── DRAG ROLES ── */
  .role-row[draggable="true"] { cursor: grab; }
  .role-row.dragging-role { opacity: 0.35; }
  .role-row.drag-role-over { outline: 2px dashed var(--blue); outline-offset: 2px; border-radius: var(--radius); }
  .role-drag-handle {
    color: var(--text3);
    font-size: 11px;
    cursor: grab;
    padding: 0 3px;
    user-select: none;
    flex-shrink: 0;
  }
  .col-header-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .col-icon-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    width: 24px; height: 24px;
    border-radius: 5px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .col-icon-btn:hover { background: rgba(255,255,255,0.28); color: #fff; }
  /* Color picker row */
  .col-color-row {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    padding: 2px 0 4px;
  }
  .col-color-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.0);
    transition: transform 0.12s, border-color 0.12s;
    flex-shrink: 0;
  }
  .col-color-dot:hover { transform: scale(1.2); border-color: rgba(255,255,255,0.5); }
  .col-color-dot.active { border-color: rgba(255,255,255,0.9); transform: scale(1.1); }
  .col-body { padding: 10px; }

  /* ── ROLE ROW ── */
  .role-row { margin-bottom: 8px; }
  .role-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
    padding: 0 4px 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .role-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .drop-zone {
    min-height: 52px;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 4px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: all 0.12s;
  }
  .drop-zone.has-cards { border-color: transparent; background: transparent; }
  .drop-zone.drag-over {
    border-color: var(--blue);
    background: var(--blue-light);
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 10px;
    cursor: grab;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.12s, box-shadow 0.12s, opacity 0.12s;
    position: relative;
  }
  .card:hover { border-color: var(--border2); box-shadow: var(--shadow); }
  .card.dragging { opacity: 0.3; cursor: grabbing; }
  .drop-zone.has-cards .card { background: var(--bg); }

  .avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    overflow: hidden;
    border: 1.5px solid var(--border);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-role { font-size: 10px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-date { font-size: 10px; color: var(--text3); margin-top: 1px; font-family: 'DM Mono', monospace; }
  .card-actions {
    position: absolute; top: 5px; right: 6px;
    display: flex; gap: 3px;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .card:hover .card-actions { opacity: 1; }
  .card-action-btn {
    font-size: 10px; color: var(--text3);
    cursor: pointer;
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 3px;
    border: none; background: transparent;
    transition: background 0.1s, color 0.1s;
  }
  .card-action-btn:hover { background: var(--surface2); color: var(--text); }
  .card-action-btn.del:hover { background: var(--red-light); color: var(--red); }

  /* ── UNASSIGNED ── */
  .unassigned-section {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 28px;
  }
  .unassigned-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .unassigned-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
  }
  .badge {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    color: var(--text2);
    padding: 1px 7px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .unassigned-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 52px;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 8px;
    transition: all 0.12s;
  }
  .unassigned-pool.drag-over { border-color: var(--blue); background: var(--blue-light); }
  .unassigned-pool .card { width: 200px; background: var(--bg); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,25,22,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 24px;
    width: 360px;
    max-width: 95vw;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.15s ease;
  }
  @keyframes modalIn { from { opacity:0; transform: translateY(8px) scale(0.97); } to { opacity:1; transform: none; } }
  .modal-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 16px;
    color: var(--text);
  }
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 11px; font-weight: 500; color: var(--text2); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input, .form-select {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 11px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.12s;
    outline: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--blue); background: #fff; }
  .photo-preview { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); display: none; margin-top: 6px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal-extra { padding-top: 16px; margin-top: 16px; border-top: 1px solid var(--border); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: var(--accent); color: var(--accent-fg);
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: all 0.2s;
    pointer-events: none; white-space: nowrap;
    z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── PRINT ── */
  @media print {
    .toolbar, .app-header, .unassigned-section, .card-actions, .col-icon-btn { display: none !important; }
    .board-wrap { padding: 0; }
    body { background: white; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <div class="header-logo-wrap">
      <div id="header-logo-area">
        <div class="header-logo-placeholder" onclick="openCompanyLogoModal()" title="Clique para adicionar logo da empresa">
          <span>+</span> Logo da empresa
        </div>
      </div>
      <div class="header-divider"></div>
    </div>
    <div class="header-title-group">
      <h1>Organograma de Times</h1>
      <span class="subtitle">reunião de estruturação</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn success" onclick="exportJSON()">
      <span class="btn-icon">↓</span> Exportar dados
    </button>
    <button class="btn blue" onclick="document.getElementById('import-input').click()">
      <span class="btn-icon">↑</span> Importar dados
    </button>
    <button class="btn" onclick="exportPNG()">
      <span class="btn-icon">◼</span> Salvar como imagem
    </button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</header>

<div class="toolbar">
  <button class="btn primary" onclick="openAddPerson()">
    <span class="btn-icon">+</span> Funcionário
  </button>
  <button class="btn" onclick="openAddClient()">
    <span class="btn-icon">+</span> Cliente
  </button>
  <button class="btn" onclick="openAddRole()">
    <span class="btn-icon">+</span> Cargo
  </button>
  <button class="btn" onclick="openAddLeader()">
    <span class="btn-icon">+</span> Líder
  </button>
  <div class="sep"></div>
  <button class="btn" onclick="openManageRoles()">⚙ Gerenciar cargos</button>
  <div class="sep"></div>
  <button class="btn danger" onclick="clearAll()">✕ Limpar tudo</button>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<div class="unassigned-section">
  <div class="unassigned-header">
    <span class="unassigned-title">Sem cliente alocado</span>
    <span class="badge" id="unassigned-count">0</span>
  </div>
  <div class="unassigned-pool" id="unassigned-pool"
    ondragover="onDragOver(event,null,null)"
    ondragleave="onDragLeave(event)"
    ondrop="onDrop(event,null,null)">
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModalDirect()">Cancelar</button>
      <button class="btn primary" id="modal-confirm" onclick="confirmModal()">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Predefined color palette for columns
const COL_COLORS = [
  '#1A1916','#2B5BE0','#1A7A4A','#B85A00','#7B3FA0',
  '#C0392B','#0066AA','#A03060','#00806A','#5C4B1E',
  '#2E7D8C','#6B3B2D','#4A5C1A','#1A3A6B','#7A2020',
];

const AVATAR_COLORS = [
  ['#EBF0FF','#2B5BE0'],['#E8F6EE','#1A7A4A'],['#FFF3E8','#B85A00'],
  ['#F5EEF9','#7B3FA0'],['#FEF3E2','#A06000'],['#E8F4FF','#0066AA'],
  ['#F9EEF3','#A03060'],['#EDFAF5','#00806A'],
];

let state = { clients:[], roles:[], people:[], leaders:[], drag:null, companyLogo:'' };
let modalMode = null;

function uid() { return Math.random().toString(36).slice(2,9); }
function colorFor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % AVATAR_COLORS.length;
  return AVATAR_COLORS[h];
}
function initials(n) {
  return n.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
}
function fmtDate(d) {
  if (!d) return '';
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}

function save() {
  try { localStorage.setItem('org_v3', JSON.stringify(state)); } catch(e) {}
}
function load() {
  try {
    const s = localStorage.getItem('org_v3');
    if (s) state = Object.assign({ leaders:[], companyLogo:'' }, JSON.parse(s));
    if (!state.leaders) state.leaders = [];
    if (!state.companyLogo) state.companyLogo = '';
  } catch(e) {}
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── COMPANY LOGO ── */
function renderCompanyLogo() {
  const area = document.getElementById('header-logo-area');
  if (state.companyLogo) {
    area.innerHTML = `<img class="header-company-logo" src="${state.companyLogo}" alt="Logo" onclick="openCompanyLogoModal()" title="Clique para alterar logo">`;
  } else {
    area.innerHTML = `<div class="header-logo-placeholder" onclick="openCompanyLogoModal()" title="Clique para adicionar logo da empresa"><span>+</span> Logo da empresa</div>`;
  }
}

function openCompanyLogoModal() {
  modalMode = 'company-logo';
  document.getElementById('modal-title').textContent = 'Logo da empresa';
  document.getElementById('modal-confirm').textContent = 'Salvar';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label class="form-label">Imagem</label>

function previewCompanyLogo(url) {
  const wrap = document.getElementById('f-company-preview-wrap');
  const img = document.getElementById('f-company-preview');
  if (url) { img.src = url; wrap.style.display = 'flex'; }
  else { wrap.style.display = 'none'; }
}
function clearCompanyLogo() {
  document.getElementById('f-company-logo').value = '';
  document.getElementById('f-company-preview-wrap').style.display = 'none';
}
function handleCompanyLogoFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('f-company-logo').value = ev.target.result;
    previewCompanyLogo(ev.target.result);
  };
  reader.readAsDataURL(file);
}

/* ── RENDER ── */
function render() {
  renderCompanyLogo();
  const board = document.getElementById('board');
  board.innerHTML = '';

  // Render leader groups first
  state.leaders.forEach(leader => {
    const leaderClients = state.clients.filter(c => c.leader === leader.id);
    if (!leaderClients.length && state.leaders.length > 0) return; // skip empty groups unless editing

    const group = document.createElement('div');
    group.className = 'leader-group';

    const [lbg, lfg] = colorFor(leader.name);
    const avatarHtml = leader.photo
      ? `<div class="leader-avatar"><img src="${leader.photo}" alt="${initials(leader.name)}"></div>`
      : `<div class="leader-avatar" style="background:${lbg};color:${lfg}">${initials(leader.name)}</div>`;

    group.innerHTML = `
      <div class="leader-group-header">
        ${avatarHtml}
        <div class="leader-info">
          <div class="leader-name">${leader.name}</div>
          <div class="leader-role-tag">Líder · ${leaderClients.length} cliente${leaderClients.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="leader-actions">
          <button class="leader-icon-btn" onclick="editLeader('${leader.id}')" title="Editar líder">✎</button>
          <button class="leader-icon-btn" onclick="deleteLeader('${leader.id}')" title="Remover líder" style="color:var(--red)">✕</button>
        </div>
      </div>
      <div class="leader-columns" id="leader-cols-${leader.id}"></div>`;

    const colsWrap = group.querySelector(`#leader-cols-${leader.id}`);
    leaderClients.forEach(cl => colsWrap.appendChild(makeClientCol(cl)));

    board.appendChild(group);
  });

  // Clients without a leader
  const unassignedClients = state.clients.filter(c => !c.leader);
  if (unassignedClients.length) {
    const wrap = document.createElement('div');
    wrap.className = 'no-leader-wrap';
    unassignedClients.forEach(cl => wrap.appendChild(makeClientCol(cl)));
    board.appendChild(wrap);
  }

  // Unassigned people
  const pool = document.getElementById('unassigned-pool');
  pool.innerHTML = '';
  const unassigned = state.people.filter(p => !p.client);
  unassigned.forEach(p => pool.appendChild(makeCard(p)));
  document.getElementById('unassigned-count').textContent = unassigned.length;
}

function makeClientCol(cl) {
  const col = document.createElement('div');
  col.className = 'col';

  const headerColor = cl.color || '#1A1916';
  const logoHtml = cl.logo
    ? `<img class="col-logo" src="${cl.logo}" alt="${cl.name}">`
    : '';

  // Build color dots HTML
  const dotsHtml = COL_COLORS.map(c => {
    const isActive = (cl.color || '#1A1916') === c;
    return `<div class="col-color-dot${isActive?' active':''}" style="background:${c}" onclick="setClientColor('${cl.id}','${c}')" title="Cor ${c}"></div>`;
  }).join('');

  col.innerHTML = `
    <div class="col-header" style="background:${headerColor}">
      <div class="col-header-top">
        <div class="col-header-left">
          ${logoHtml}
          <span class="col-header-name" title="${cl.name}">${cl.name}</span>
        </div>
        <div class="col-header-actions">
          <button class="col-icon-btn" onclick="editClient('${cl.id}')" title="Editar">✎</button>
        </div>
      </div>
      <div class="col-color-row">${dotsHtml}</div>
    </div>
    <div class="col-body" id="col-body-${cl.id}"></div>`;

  const body = col.querySelector('.col-body');

  state.roles.forEach(role => {
    const rr = document.createElement('div');
    rr.className = 'role-row';

    const lbl = document.createElement('div');
    lbl.className = 'role-label';
    lbl.textContent = role.name;

    const dz = document.createElement('div');
    dz.className = 'drop-zone';
    dz.dataset.client = cl.id;
    dz.dataset.role = role.id;
    dz.ondragover = e => onDragOver(e, cl.id, role.id);
    dz.ondragleave = e => onDragLeave(e);
    dz.ondrop = e => onDrop(e, cl.id, role.id);

    const here = state.people.filter(p => p.client === cl.id && p.role === role.id);
    here.forEach(p => dz.appendChild(makeCard(p)));
    if (here.length) dz.classList.add('has-cards');

    rr.appendChild(lbl);
    rr.appendChild(dz);
    body.appendChild(rr);
  });

  return col;
}

function setClientColor(clientId, color) {
  const cl = state.clients.find(c => c.id === clientId);
  if (cl) { cl.color = color; save(); render(); }
}

function makeCard(p) {
  const card = document.createElement('div');
  card.className = 'card';
  card.draggable = true;
  card.dataset.id = p.id;
  card.ondragstart = e => onDragStart(e, p.id);
  card.ondragend = onDragEnd;

  const [bg, fg] = colorFor(p.name);
  const avatarHtml = p.photo
    ? `<div class="avatar"><img src="${p.photo}" alt="${initials(p.name)}"></div>`
    : `<div class="avatar" style="background:${bg};color:${fg}">${initials(p.name)}</div>`;

  const roleName = getRoleName(p.role);
  card.innerHTML = `
    ${avatarHtml}
    <div class="card-info">
      <div class="card-name">${p.name}</div>
      <div class="card-role">${roleName}</div>
      <div class="card-date">${fmtDate(p.date)}</div>
    </div>
    <div class="card-actions">
      <button class="card-action-btn" onclick="editPerson('${p.id}',event)" title="Editar">✎</button>
      <button class="card-action-btn del" onclick="deletePerson('${p.id}',event)" title="Remover">✕</button>
    </div>`;

  return card;
}

function getRoleName(rid) {
  const r = state.roles.find(r => r.id === rid);
  return r ? r.name : '—';
}

function onDragStart(e, id) {
  state.drag = id;
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}
function onDragEnd() {
  document.querySelectorAll('.card.dragging').forEach(c => c.classList.remove('dragging'));
  document.querySelectorAll('.drag-over').forEach(z => z.classList.remove('drag-over'));
}
function onDragOver(e, cid, rid) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, cid, rid) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!state.drag) return;
  const p = state.people.find(p => p.id === state.drag);
  if (!p) return;
  p.client = cid || null;
  if (rid) p.role = rid;
  state.drag = null;
  save(); render();
}

function deletePerson(id, e) {
  e.stopPropagation();
  if (!confirm('Remover este funcionário do organograma?')) return;
  state.people = state.people.filter(p => p.id !== id);
  save(); render();
  showToast('Funcionário removido');
}

    <div id="roles-list">${rows}</div>`;
}

let roleDragIdx = null;
function onRoleDragStart(e, idx) {
  roleDragIdx = idx;
  setTimeout(() => {
    const el = document.querySelector(`[data-role-idx="${idx}"]`);
    if (el) el.style.opacity = '0.35';
  }, 0);
}
function onRoleDragOver(e, idx) {
  e.preventDefault();
  if (roleDragIdx === null || roleDragIdx === idx) return;
  document.querySelectorAll('.role-manage-row').forEach(r => r.style.outline = '');
  const el = document.querySelector(`[data-role-idx="${idx}"]`);
  if (el) el.style.outline = '2px dashed var(--blue)';
}
function onRoleDragLeave(e) {
  e.currentTarget.style.outline = '';
}
function onRoleDrop(e, idx) {
  e.preventDefault();
  if (roleDragIdx === null || roleDragIdx === idx) return;
  const moved = state.roles.splice(roleDragIdx, 1)[0];
  state.roles.splice(idx, 0, moved);
  roleDragIdx = null;
  save(); render(); renderManageRoles();
  showToast('Ordem dos cargos atualizada');
}
function onRoleDragEnd() {
  document.querySelectorAll('.role-manage-row').forEach(r => {
    r.style.opacity = '';
    r.style.outline = '';
  });
  roleDragIdx = null;
}

function renameRole(id) {
  const r = state.roles.find(r => r.id === id);
  const name = prompt('Novo nome para o cargo:', r.name);
  if (name && name.trim()) { r.name = name.trim(); save(); render(); renderManageRoles(); }
}
function deleteRole(id) {
  if (!confirm('Remover cargo? Funcionários com esse cargo ficarão sem cargo.')) return;
  state.people.forEach(p => { if (p.role === id) p.role = null; });
  state.roles = state.roles.filter(r => r.id !== id);
  save(); render(); renderManageRoles();
}

function showModal() {
  document.getElementById('modal-confirm').style.display = '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => { const el = document.getElementById('f-name'); if (el) el.focus(); }, 80);
}
function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalMode = null;
}

function confirmModal() {
  if (modalMode === 'manage-roles') { closeModalDirect(); return; }
  const nameEl = document.getElementById('f-name');
  const name = nameEl ? nameEl.value.trim() : '';

  if (modalMode === 'company-logo') {
    state.companyLogo = (document.getElementById('f-company-logo') ? document.getElementById('f-company-logo').value.trim() : '') || '';
    closeModalDirect(); save(); render();
    showToast('Logo atualizado');
    return;
  }

  if (modalMode === 'person') {
    if (!name) { nameEl.focus(); return; }
    state.people.push({
      id: uid(), name,
      role: document.getElementById('f-role').value || null,
      client: document.getElementById('f-client').value || null,
      date: document.getElementById('f-date').value || '',
      photo: document.getElementById('f-photo').value.trim() || ''
    });
    showToast('Funcionário adicionado');
  } else if (modalMode === 'edit-person') {
    const id = document.getElementById('f-id').value;
    const p = state.people.find(p => p.id === id);
    if (p && name) {
      p.name = name;
      p.role = document.getElementById('f-role').value || null;
      p.client = document.getElementById('f-client').value || null;
      p.date = document.getElementById('f-date').value || '';
      p.photo = document.getElementById('f-photo').value.trim() || '';
      showToast('Funcionário atualizado');
    }
  } else if (modalMode === 'client') {
    if (!name) { nameEl.focus(); return; }
    const leaderEl = document.getElementById('f-leader');
    state.clients.push({ id: uid(), name, leader: leaderEl ? leaderEl.value || null : null });
    showToast('Cliente adicionado');
  } else if (modalMode === 'role') {
    if (!name) { nameEl.focus(); return; }
    state.roles.push({ id: uid(), name });
    showToast('Cargo adicionado');
  } else if (modalMode === 'edit-client') {
    const id = document.getElementById('f-id').value;
    const cl = state.clients.find(c => c.id === id);
    if (cl && name) {
      cl.name = name;
      cl.logo = (document.getElementById('f-logo') ? document.getElementById('f-logo').value.trim() : cl.logo) || '';
      const leaderEl = document.getElementById('f-leader');
      if (leaderEl) cl.leader = leaderEl.value || null;
      showToast('Cliente atualizado');
    }
  } else if (modalMode === 'leader') {
    if (!name) { nameEl.focus(); return; }
    state.leaders.push({
      id: uid(), name,
      photo: (document.getElementById('f-photo') ? document.getElementById('f-photo').value.trim() : '') || ''
    });
    showToast('Líder adicionado');
  } else if (modalMode === 'edit-leader') {
    const id = document.getElementById('f-id').value;
    const leader = state.leaders.find(l => l.id === id);
    if (leader && name) {
      leader.name = name;
      leader.photo = (document.getElementById('f-photo') ? document.getElementById('f-photo').value.trim() : '') || '';
      // Update client assignments
      const sel = document.getElementById('f-leader-clients');
      if (sel) {
        const selected = Array.from(sel.selectedOptions).map(o => o.value);
        state.clients.forEach(c => {
          if (selected.includes(c.id)) c.leader = id;
          else if (c.leader === id) c.leader = null;
        });
      }
      showToast('Líder atualizado');
    }
  }
  closeModalDirect(); save(); render();
}

/* ── EXPORT / IMPORT ── */
function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'organograma_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  showToast('Dados exportados!');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.clients && data.roles && data.people) {
        state = Object.assign({ leaders:[], companyLogo:'' }, data);
        save(); render();
        showToast('Dados importados com sucesso!');
      } else {
        alert('Arquivo inválido.');
      }
    } catch { alert('Erro ao ler o arquivo.'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function exportPNG() {
  showToast('Gerando imagem...');
  const board = document.getElementById('board');
  html2canvas(board, {
    backgroundColor: '#F7F6F3',
    scale: 2,
    useCORS: true,
    logging: false
  }).then(canvas => {
    const a = document.createElement('a');
    a.download = 'organograma_' + new Date().toISOString().slice(0,10) + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    showToast('Imagem salva!');
  });
}

function clearAll() {
  if (!confirm('Limpar todo o organograma? Esta ação não pode ser desfeita.')) return;
  state = { clients:[], roles:[], people:[], leaders:[], drag:null, companyLogo:'' };
  save(); render();
  showToast('Organograma limpo');
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  if (document.getElementById('modal-overlay').classList.contains('open')) {
    if (e.key === 'Enter' && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'SELECT') confirmModal();
    if (e.key === 'Escape') closeModalDirect();
  }
});

load();
